app = "pipelineiq-worker"
primary_region = "sin"

[build]
dockerfile = "Dockerfile"

[env]
ENVIRONMENT = "production"
UPLOAD_DIR = "/tmp/uploads"

[[vm]]
memory = "512mb"
cpu_kind = "shared"
cpus = 1

[processes]
worker = "celery -A backend.celery_app:celery_app worker --loglevel=info --concurrency=2"
