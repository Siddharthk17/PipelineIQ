app = "pipelineiq-api"
primary_region = "sin"

[build]
dockerfile = "Dockerfile"

[env]
ENVIRONMENT = "production"
APP_VERSION = "1.0.0"
UPLOAD_DIR = "/tmp/uploads"

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[[http_service.checks]]
grace_period = "30s"
interval = "15s"
method = "GET"
path = "/health"
timeout = "10s"

[[vm]]
memory = "512mb"
cpu_kind = "shared"
cpus = 1
