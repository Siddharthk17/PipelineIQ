services:
  postgres:
    image: postgres:15-alpine
    container_name: pipelineiq-postgres
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=5
      -c wal_keep_size=256MB
      -c hot_standby=on
    environment:
      POSTGRES_DB: pipelineiq
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-${POSTGRES_PASSWORD}}
    expose:
      - "5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./postgres/primary-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      pipelineiq-network:
        aliases:
          - db

  postgres-replica:
    image: postgres:15-alpine
    container_name: pipelineiq-db-replica
    entrypoint: ["/bin/sh", "/etc/postgres-replica/replica-entrypoint.sh"]
    environment:
      POSTGRES_DB: pipelineiq
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-${POSTGRES_PASSWORD}}
      PRIMARY_HOST: postgres
    expose:
      - "5432"
    volumes:
      - postgres_replica_data_v2:/var/lib/postgresql/data
      - ./postgres/replica-entrypoint.sh:/etc/postgres-replica/replica-entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pipelineiq-network

  pgbouncer:
    build:
      context: ./pgbouncer
      dockerfile: Dockerfile
    container_name: pipelineiq-pgbouncer
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: "5432"
      DATABASES_DBNAME: pipelineiq
      DATABASES_USER: ${POSTGRES_USER}
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASES_CLIENT_ALIAS_USER: pipelineiq_user
      PGBOUNCER_LISTEN_PORT: "5432"
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "1000"
      PGBOUNCER_DEFAULT_POOL_SIZE: "25"
      PGBOUNCER_MIN_POOL_SIZE: "5"
      PGBOUNCER_RESERVE_POOL_SIZE: "5"
      PGBOUNCER_SERVER_IDLE_TIMEOUT: "600"
      PGBOUNCER_CLIENT_IDLE_TIMEOUT: "0"
      PGBOUNCER_LOG_POOLER_ERRORS: "1"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER} -d pipelineiq"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pipelineiq-network

  pgbouncer-replica:
    build:
      context: ./pgbouncer
      dockerfile: Dockerfile
    container_name: pipelineiq-pgbouncer-replica
    environment:
      DATABASES_HOST: postgres-replica
      DATABASES_PORT: "5432"
      DATABASES_DBNAME: pipelineiq
      DATABASES_USER: ${POSTGRES_USER}
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASES_CLIENT_ALIAS_USER: pipelineiq_user
      PGBOUNCER_LISTEN_PORT: "5432"
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "1000"
      PGBOUNCER_DEFAULT_POOL_SIZE: "25"
      PGBOUNCER_MIN_POOL_SIZE: "5"
      PGBOUNCER_RESERVE_POOL_SIZE: "5"
      PGBOUNCER_SERVER_IDLE_TIMEOUT: "600"
      PGBOUNCER_CLIENT_IDLE_TIMEOUT: "0"
      PGBOUNCER_LOG_POOLER_ERRORS: "1"
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER} -d pipelineiq"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres-replica:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pipelineiq-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipelineiq-api
    command:
      - sh
      - -c
      - "python -m alembic upgrade head && (python -m backend.scripts.seed_demo || true) && exec gunicorn backend.main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --worker-connections 1000 --max-requests 10000 --max-requests-jitter 1000 --timeout 30 --graceful-timeout 30 --bind 0.0.0.0:8000 --access-logfile - --error-logfile - --log-level info"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_WRITE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_READ_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - REDIS_URL=redis://redis-broker:6379/0
      - REDIS_BROKER_URL=redis://redis-broker:6379/0
      - REDIS_PUBSUB_URL=redis://redis-pubsub:6380/0
      - REDIS_CACHE_URL=redis://redis-cache:6381/0
      - REDIS_YJS_URL=redis://redis-yjs:6382/0
    depends_on:
      pgbouncer:
        condition: service_healthy
      pgbouncer-replica:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-yjs:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - ./backend:/app/backend
      - ./alembic.ini:/app/alembic.ini
      - ./nginx/conf.d:/app/nginx/conf.d:ro
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ./nginx:/app/nginx:ro
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status==200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pipelineiq-network

  sse-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipelineiq-sse-service
    command: >
      gunicorn backend.sse_app:sse_app
      --workers 2
      --worker-class uvicorn.workers.UvicornWorker
      --worker-connections 5000
      --timeout 600
      --graceful-timeout 10
      --bind 0.0.0.0:8001
      --access-logfile -
      --error-logfile -
      --log-level info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_WRITE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_READ_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - REDIS_URL=redis://redis-broker:6379/0
      - REDIS_BROKER_URL=redis://redis-broker:6379/0
      - REDIS_PUBSUB_URL=redis://redis-pubsub:6380/0
      - REDIS_CACHE_URL=redis://redis-cache:6381/0
      - REDIS_YJS_URL=redis://redis-yjs:6382/0
    depends_on:
      pgbouncer:
        condition: service_healthy
      pgbouncer-replica:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-yjs:
        condition: service_healthy
    ports:
      - "8001:8001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3).status==200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./backend:/app/backend
      - ./alembic.ini:/app/alembic.ini
    restart: unless-stopped
    networks:
      - pipelineiq-network

  worker-critical:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipelineiq-worker-critical
    command: >
      celery -A backend.celery_app:celery_app worker
      --queues=critical
      --concurrency=${CELERY_WORKERS_CRITICAL:-2}
      --prefetch-multiplier=1
      --hostname=critical@%h
      --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_WRITE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_READ_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - REDIS_URL=redis://redis-broker:6379/0
      - REDIS_BROKER_URL=redis://redis-broker:6379/0
      - REDIS_PUBSUB_URL=redis://redis-pubsub:6380/0
      - REDIS_CACHE_URL=redis://redis-cache:6381/0
      - REDIS_YJS_URL=redis://redis-yjs:6382/0
    depends_on:
      pgbouncer:
        condition: service_healthy
      pgbouncer-replica:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-yjs:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - ./backend:/app/backend
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import pathlib,sys; sys.exit(0 if b'celery' in pathlib.Path('/proc/1/cmdline').read_bytes() else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pipelineiq-network

  worker-default:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipelineiq-worker-default
    command: >
      celery -A backend.celery_app:celery_app worker
      --queues=critical,default
      --concurrency=${CELERY_WORKERS_DEFAULT:-3}
      --prefetch-multiplier=1
      --hostname=default@%h
      --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_WRITE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_READ_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - REDIS_URL=redis://redis-broker:6379/0
      - REDIS_BROKER_URL=redis://redis-broker:6379/0
      - REDIS_PUBSUB_URL=redis://redis-pubsub:6380/0
      - REDIS_CACHE_URL=redis://redis-cache:6381/0
      - REDIS_YJS_URL=redis://redis-yjs:6382/0
    depends_on:
      pgbouncer:
        condition: service_healthy
      pgbouncer-replica:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-yjs:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - ./backend:/app/backend
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import pathlib,sys; sys.exit(0 if b'celery' in pathlib.Path('/proc/1/cmdline').read_bytes() else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pipelineiq-network

  worker-bulk:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipelineiq-worker-bulk
    command: >
      celery -A backend.celery_app:celery_app worker
      --queues=bulk
      --concurrency=${CELERY_WORKERS_BULK:-2}
      --prefetch-multiplier=1
      --hostname=bulk@%h
      --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_WRITE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_READ_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - REDIS_URL=redis://redis-broker:6379/0
      - REDIS_BROKER_URL=redis://redis-broker:6379/0
      - REDIS_PUBSUB_URL=redis://redis-pubsub:6380/0
      - REDIS_CACHE_URL=redis://redis-cache:6381/0
      - REDIS_YJS_URL=redis://redis-yjs:6382/0
    depends_on:
      pgbouncer:
        condition: service_healthy
      pgbouncer-replica:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-yjs:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - ./backend:/app/backend
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import pathlib,sys; sys.exit(0 if b'celery' in pathlib.Path('/proc/1/cmdline').read_bytes() else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pipelineiq-network

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipelineiq-celery-beat
    command: >
      celery -A backend.celery_app:celery_app beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_WRITE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_READ_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - REDIS_URL=redis://redis-broker:6379/0
      - REDIS_BROKER_URL=redis://redis-broker:6379/0
      - REDIS_PUBSUB_URL=redis://redis-pubsub:6380/0
      - REDIS_CACHE_URL=redis://redis-cache:6381/0
      - REDIS_YJS_URL=redis://redis-yjs:6382/0
    depends_on:
      pgbouncer:
        condition: service_healthy
      pgbouncer-replica:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-yjs:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped
    networks:
      - pipelineiq-network

  redis-broker:
    image: redis:7-alpine
    container_name: pipelineiq-redis-broker
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --loglevel notice
    ports:
      - "6379:6379"
    volumes:
      - redis_broker_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - pipelineiq-network

  redis-pubsub:
    image: redis:7-alpine
    container_name: pipelineiq-redis-pubsub
    command: >
      redis-server
      --port 6380
      --maxmemory 256mb
      --save ""
      --appendonly no
      --loglevel notice
    ports:
      - "6380:6380"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - pipelineiq-network

  redis-cache:
    image: redis:7-alpine
    container_name: pipelineiq-redis-cache
    command: >
      redis-server
      --port 6381
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --loglevel notice
    ports:
      - "6381:6381"
    volumes:
      - redis_cache_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6381", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - pipelineiq-network

  redis-yjs:
    image: redis:7-alpine
    container_name: pipelineiq-redis-yjs
    command: >
      redis-server
      --port 6382
      --maxmemory 128mb
      --appendonly yes
      --loglevel notice
    ports:
      - "6382:6382"
    volumes:
      - redis_yjs_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6382", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - pipelineiq-network

  minio:
    image: minio/minio:RELEASE.2024-12-06T15-50-33Z
    container_name: pipelineiq-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-pipelineiq}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-pipelineiq123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "/minio", "--help"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pipelineiq-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "/api/v1"
    container_name: pipelineiq-frontend
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - pipelineiq-network

  flower:
    build: ./backend
    container_name: pipelineiq-flower
    command: >
      celery -A backend.celery_app:celery_app flower
      --port=5555
      --url_prefix=flower
      --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis-broker:6379/0
      - REDIS_BROKER_URL=redis://redis-broker:6379/0
      - REDIS_PUBSUB_URL=redis://redis-pubsub:6380/0
      - REDIS_CACHE_URL=redis://redis-cache:6381/0
      - REDIS_YJS_URL=redis://redis-yjs:6382/0
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_WRITE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_READ_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - FLOWER_USER=${FLOWER_USER}
      - FLOWER_PASSWORD=${FLOWER_PASSWORD}
    depends_on:
      pgbouncer:
        condition: service_healthy
      pgbouncer-replica:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-yjs:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pipelineiq-network

  nginx:
    build: ./nginx
    container_name: pipelineiq-nginx
    ports:
      - "80:80"
    depends_on:
      - api
      - sse-service
      - frontend
      - flower
      - grafana
    restart: unless-stopped
    networks:
      - pipelineiq-network

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: pipelineiq-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - pipelineiq-network

  grafana:
    image: grafana/grafana:10.2.0
    container_name: pipelineiq-grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - pipelineiq-network

volumes:
  uploads:
  db_data:
  postgres_replica_data_v2:
  redis_broker_data:
  redis_cache_data:
  redis_yjs_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  pipelineiq-network:
    driver: bridge
