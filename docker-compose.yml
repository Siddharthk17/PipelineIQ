version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pipelineiq-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./pipelineiq.db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - db_data:/app
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pipelineiq-worker
    command: celery -A backend.celery_app:celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./pipelineiq.db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - db_data:/app
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pipelineiq-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  uploads:
  db_data:
