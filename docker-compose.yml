services:
  redis-overcommit-fix:
    image: alpine:3.19
    container_name: pipelineiq-redis-overcommit-fix
    command: ["sh", "-c", "echo 'Set vm.overcommit_memory=1 on the Docker host before production startup'"]
    restart: "no"
    networks:
      - pipelineiq-network

  postgres:
    image: postgres:15-alpine
    container_name: pipelineiq-postgres
    command: >
      postgres
      -c max_connections=200
      -c wal_level=replica
      -c max_wal_senders=5
      -c wal_keep_size=512MB
      -c hot_standby=on
      -c hot_standby_feedback=on
      -c log_min_duration_statement=100
      -c shared_preload_libraries=pg_stat_statements
      -c statement_timeout=30000
      -c work_mem=64MB
    environment:
      POSTGRES_DB: pipelineiq
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-${POSTGRES_PASSWORD}}
    expose:
      - "5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./postgres/primary-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      pipelineiq-network:
        aliases:
          - db

  postgres-replica:
    image: postgres:15-alpine
    container_name: pipelineiq-db-replica
    entrypoint: ["/bin/sh", "/etc/postgres-replica/replica-entrypoint.sh"]
    environment:
      POSTGRES_DB: pipelineiq
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-${POSTGRES_PASSWORD}}
      PRIMARY_HOST: postgres
    expose:
      - "5432"
    volumes:
      - postgres_replica_data_v2:/var/lib/postgresql/data
      - ./postgres/replica-entrypoint.sh:/etc/postgres-replica/replica-entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pipelineiq-network

  pgbouncer:
    build:
      context: ./pgbouncer
      dockerfile: Dockerfile
    container_name: pipelineiq-pgbouncer
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: "5432"
      DATABASES_DBNAME: pipelineiq
      DATABASES_USER: ${POSTGRES_USER}
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASES_CLIENT_ALIAS_USER: pipelineiq_user
      PGBOUNCER_LISTEN_PORT: "5432"
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "10000"
      PGBOUNCER_DEFAULT_POOL_SIZE: "50"
      PGBOUNCER_MIN_POOL_SIZE: "10"
      PGBOUNCER_RESERVE_POOL_SIZE: "10"
      PGBOUNCER_SERVER_IDLE_TIMEOUT: "600"
      PGBOUNCER_CLIENT_IDLE_TIMEOUT: "0"
      PGBOUNCER_SERVER_LOGIN_RETRY: "3"
      PGBOUNCER_LOG_POOLER_ERRORS: "1"
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER} -d pipelineiq"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pipelineiq-network

  pgbouncer-replica:
    build:
      context: ./pgbouncer
      dockerfile: Dockerfile
    container_name: pipelineiq-pgbouncer-replica
    environment:
      DATABASES_HOST: postgres-replica
      DATABASES_PORT: "5432"
      DATABASES_DBNAME: pipelineiq
      DATABASES_USER: ${POSTGRES_USER}
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASES_CLIENT_ALIAS_USER: pipelineiq_user
      PGBOUNCER_LISTEN_PORT: "5432"
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "10000"
      PGBOUNCER_DEFAULT_POOL_SIZE: "50"
      PGBOUNCER_MIN_POOL_SIZE: "10"
      PGBOUNCER_RESERVE_POOL_SIZE: "10"
      PGBOUNCER_SERVER_IDLE_TIMEOUT: "600"
      PGBOUNCER_CLIENT_IDLE_TIMEOUT: "0"
      PGBOUNCER_SERVER_LOGIN_RETRY: "3"
      PGBOUNCER_LOG_POOLER_ERRORS: "1"
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER} -d pipelineiq"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres-replica:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pipelineiq-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipelineiq-api
    command:
      - sh
      - -c
      - 'mkdir -p /tmp/gunicorn && python -m backend.scripts.wait_for_db && (python -m backend.scripts.seed_demo || true) && exec gunicorn backend.main:app --config backend/gunicorn.conf.py'
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - GUNICORN_WORKERS=4
      - GUNICORN_TIMEOUT=60
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_WRITE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_READ_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer-replica:5432/pipelineiq
      - REDIS_BROKER_URL=redis://:${REDIS_PASSWORD}@redis-broker:6379/0
      - REDIS_BACKEND_URL=redis://:${REDIS_PASSWORD}@redis-broker:6379/1
      - REDIS_PUBSUB_URL=redis://:${REDIS_PASSWORD}@redis-pubsub:6380/0
      - REDIS_CACHE_URL=redis://:${REDIS_PASSWORD}@redis-cache:6381/0
      - REDIS_YJS_URL=redis://:${REDIS_PASSWORD}@redis-yjs:6382/0
      - REDPANDA_BROKERS=redpanda:9093
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis-broker:6379/1
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE:-524288000}
      - STORAGE_TYPE=${STORAGE_TYPE:-s3}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-pipelineiq-uploads}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - OTEL_SERVICE_NAME=pipelineiq-api
      - OTEL_SAMPLE_RATE=1.0
    depends_on:
      pgbouncer:
        condition: service_healthy
      pgbouncer-replica:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-yjs:
        condition: service_healthy
      minio:
        condition: service_healthy
    shm_size: '2gb'
    volumes:
      - uploads:/app/uploads
      - ./backend:/app/backend
      - ./alembic.ini:/app/alembic.ini
      - ./nginx/conf.d:/app/nginx/conf.d:ro
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ./nginx:/app/nginx:ro
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=10).status==200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pipelineiq-network

  sse-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipelineiq-sse-service
    command: >
      sh -c "mkdir -p /tmp/gunicorn &&
      gunicorn backend.sse_app:sse_app
      --config backend/gunicorn.conf.py
      --bind 0.0.0.0:8001"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - GUNICORN_WORKERS=2
      - GUNICORN_TIMEOUT=600
      - GUNICORN_LOG_LEVEL=info
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_WRITE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_READ_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer-replica:5432/pipelineiq
      - REDIS_BROKER_URL=redis://:${REDIS_PASSWORD}@redis-broker:6379/0
      - REDIS_BACKEND_URL=redis://:${REDIS_PASSWORD}@redis-broker:6379/1
      - REDIS_PUBSUB_URL=redis://:${REDIS_PASSWORD}@redis-pubsub:6380/0
      - REDIS_CACHE_URL=redis://:${REDIS_PASSWORD}@redis-cache:6381/0
      - REDIS_YJS_URL=redis://:${REDIS_PASSWORD}@redis-yjs:6382/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis-broker:6379/1
      - STORAGE_TYPE=${STORAGE_TYPE:-s3}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-pipelineiq-uploads}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - OTEL_SERVICE_NAME=pipelineiq-sse
      - OTEL_SAMPLE_RATE=1.0
    depends_on:
      pgbouncer:
        condition: service_healthy
      pgbouncer-replica:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-yjs:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3).status==200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./backend:/app/backend
      - ./alembic.ini:/app/alembic.ini
    restart: unless-stopped
    networks:
      - pipelineiq-network

  worker-critical:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipelineiq-worker-critical
    command: >
      celery -A backend.celery_app:celery_app worker -E
      --queues=critical
      --concurrency=${CELERY_WORKERS_CRITICAL:-2}
      --prefetch-multiplier=1
      --hostname=critical@%h
      --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_WRITE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_READ_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer-replica:5432/pipelineiq
      - REDIS_BROKER_URL=redis://:${REDIS_PASSWORD}@redis-broker:6379/0
      - REDIS_BACKEND_URL=redis://:${REDIS_PASSWORD}@redis-broker:6379/1
      - REDIS_PUBSUB_URL=redis://:${REDIS_PASSWORD}@redis-pubsub:6380/0
      - REDIS_CACHE_URL=redis://:${REDIS_PASSWORD}@redis-cache:6381/0
      - REDIS_YJS_URL=redis://:${REDIS_PASSWORD}@redis-yjs:6382/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis-broker:6379/1
      - OTEL_SERVICE_NAME=pipelineiq-worker
      - OTEL_SAMPLE_RATE=1.0
      - STORAGE_TYPE=${STORAGE_TYPE:-s3}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-pipelineiq-uploads}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
    depends_on:
      pgbouncer:
        condition: service_healthy
      pgbouncer-replica:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-yjs:
        condition: service_healthy
      minio:
        condition: service_healthy
    shm_size: '2gb'
    volumes:
      - uploads:/app/uploads
      - ./backend:/app/backend
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import pathlib,sys; sys.exit(0 if b'celery' in pathlib.Path('/proc/1/cmdline').read_bytes() else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pipelineiq-network

  worker-default:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipelineiq-worker-default
    command: >
      celery -A backend.celery_app:celery_app worker
      --queues=critical,default
      --concurrency=${CELERY_WORKERS_DEFAULT:-3}
      --prefetch-multiplier=1
      --hostname=default@%h
      -E
      --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_WRITE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_READ_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer-replica:5432/pipelineiq
      - REDIS_BROKER_URL=redis://:${REDIS_PASSWORD}@redis-broker:6379/0
      - REDIS_BACKEND_URL=redis://:${REDIS_PASSWORD}@redis-broker:6379/1
      - REDIS_PUBSUB_URL=redis://:${REDIS_PASSWORD}@redis-pubsub:6380/0
      - REDIS_CACHE_URL=redis://:${REDIS_PASSWORD}@redis-cache:6381/0
      - REDIS_YJS_URL=redis://:${REDIS_PASSWORD}@redis-yjs:6382/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis-broker:6379/1
      - OTEL_SERVICE_NAME=pipelineiq-worker
      - OTEL_SAMPLE_RATE=1.0
      - STORAGE_TYPE=${STORAGE_TYPE:-s3}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-pipelineiq-uploads}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
    depends_on:
      pgbouncer:
        condition: service_healthy
      pgbouncer-replica:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-yjs:
        condition: service_healthy
      minio:
        condition: service_healthy
    shm_size: '2gb'
    volumes:
      - uploads:/app/uploads
      - ./backend:/app/backend
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import pathlib,sys; sys.exit(0 if b'celery' in pathlib.Path('/proc/1/cmdline').read_bytes() else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pipelineiq-network

  worker-bulk:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipelineiq-worker-bulk
    command: >
      celery -A backend.celery_app:celery_app worker -E
      --queues=bulk
      --concurrency=${CELERY_WORKERS_BULK:-2}
      --prefetch-multiplier=1
      --hostname=bulk@%h
      --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_WRITE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_READ_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer-replica:5432/pipelineiq
      - REDIS_BROKER_URL=redis://:${REDIS_PASSWORD}@redis-broker:6379/0
      - REDIS_BACKEND_URL=redis://:${REDIS_PASSWORD}@redis-broker:6379/1
      - REDIS_PUBSUB_URL=redis://:${REDIS_PASSWORD}@redis-pubsub:6380/0
      - REDIS_CACHE_URL=redis://:${REDIS_PASSWORD}@redis-cache:6381/0
      - REDIS_YJS_URL=redis://:${REDIS_PASSWORD}@redis-yjs:6382/0
      - REDPANDA_BROKERS=redpanda:9093
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis-broker:6379/1
      - OTEL_SERVICE_NAME=pipelineiq-worker
      - OTEL_SAMPLE_RATE=1.0
      - STORAGE_TYPE=${STORAGE_TYPE:-s3}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-pipelineiq-uploads}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
    depends_on:
      pgbouncer:
        condition: service_healthy
      pgbouncer-replica:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-yjs:
        condition: service_healthy
      minio:
        condition: service_healthy
    shm_size: '2gb'
    volumes:
      - uploads:/app/uploads
      - ./backend:/app/backend
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import pathlib,sys; sys.exit(0 if b'celery' in pathlib.Path('/proc/1/cmdline').read_bytes() else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pipelineiq-network

  worker-gemini:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipelineiq-worker-gemini
    command: >
      celery -A backend.celery_app:celery_app worker -E
      --queues=gemini
      --concurrency=1
      --prefetch-multiplier=1
      --hostname=gemini@%h
      --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_WRITE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_READ_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer-replica:5432/pipelineiq
      - REDIS_BROKER_URL=redis://:${REDIS_PASSWORD}@redis-broker:6379/0
      - REDIS_BACKEND_URL=redis://:${REDIS_PASSWORD}@redis-broker:6379/1
      - REDIS_PUBSUB_URL=redis://:${REDIS_PASSWORD}@redis-pubsub:6380/0
      - REDIS_CACHE_URL=redis://:${REDIS_PASSWORD}@redis-cache:6381/0
      - REDIS_YJS_URL=redis://:${REDIS_PASSWORD}@redis-yjs:6382/0
      - REDPANDA_BROKERS=redpanda:9093
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis-broker:6379/1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GEMINI_FALLBACK_MODELS=${GEMINI_FALLBACK_MODELS:-gemini-2.0-flash,gemini-1.5-flash}
      - OTEL_SERVICE_NAME=pipelineiq-worker
      - OTEL_SAMPLE_RATE=1.0
      - STORAGE_TYPE=${STORAGE_TYPE:-s3}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-pipelineiq-uploads}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
    depends_on:
      pgbouncer:
        condition: service_healthy
      pgbouncer-replica:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-yjs:
        condition: service_healthy
      minio:
        condition: service_healthy
    shm_size: '1gb'
    volumes:
      - uploads:/app/uploads
      - ./backend:/app/backend
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import pathlib,sys; sys.exit(0 if b'celery' in pathlib.Path('/proc/1/cmdline').read_bytes() else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
    restart: unless-stopped
    networks:
      - pipelineiq-network

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipelineiq-celery-beat
    command: >
      celery -A backend.celery_app:celery_app beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_WRITE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_READ_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer-replica:5432/pipelineiq
      - REDIS_BROKER_URL=redis://:${REDIS_PASSWORD}@redis-broker:6379/0
      - REDIS_BACKEND_URL=redis://:${REDIS_PASSWORD}@redis-broker:6379/1
      - REDIS_PUBSUB_URL=redis://:${REDIS_PASSWORD}@redis-pubsub:6380/0
      - REDIS_CACHE_URL=redis://:${REDIS_PASSWORD}@redis-cache:6381/0
      - REDIS_YJS_URL=redis://:${REDIS_PASSWORD}@redis-yjs:6382/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis-broker:6379/1
      - OTEL_SERVICE_NAME=pipelineiq-worker
      - OTEL_SAMPLE_RATE=1.0
    depends_on:
      pgbouncer:
        condition: service_healthy
      pgbouncer-replica:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-yjs:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped
    networks:
      - pipelineiq-network

  redis-broker:
    image: redis:7.4-alpine
    container_name: pipelineiq-redis-broker
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    sysctls:
      net.core.somaxconn: 511
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --requirepass ${REDIS_PASSWORD}
      --loglevel notice
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_broker_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - pipelineiq-network

  redis-pubsub:
    image: redis:7.4-alpine
    container_name: pipelineiq-redis-pubsub
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    sysctls:
      net.core.somaxconn: 511
    command: >
      redis-server
      --port 6380
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --requirepass ${REDIS_PASSWORD}
      --loglevel notice
    ports:
      - "127.0.0.1:6380:6380"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 6380 -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - pipelineiq-network

  redis-cache:
    image: redis:7.4-alpine
    container_name: pipelineiq-redis-cache
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis-overcommit-fix:
        condition: service_completed_successfully
    sysctls:
      net.core.somaxconn: 511
    command: >
      redis-server
      --port 6381
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --maxmemory-samples 10
      --save ""
      --appendonly no
      --requirepass ${REDIS_PASSWORD}
      --loglevel notice
    ports:
      - "127.0.0.1:6381:6381"
    volumes:
      - redis_cache_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 6381 -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - pipelineiq-network

  y-websocket:
    image: node:20-alpine
    container_name: pipelineiq-y-websocket
    working_dir: /app
    command: sh -c "npm install --omit=dev && node server.js"
    volumes:
      - ./y-websocket:/app
    ports:
      - "127.0.0.1:1234:1234"
    environment:
      - REDIS_YJS_URL=redis://:${REDIS_PASSWORD}@redis-yjs:6382
      - JWT_SECRET=${SECRET_KEY}
      - PORT=1234
    depends_on:
      redis-yjs:
        condition: service_healthy
    mem_limit: 80m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').createConnection(1234,'localhost').on('connect',function(){process.exit(0)}).on('error',function(){process.exit(1)})\""]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s
    networks:
      - pipelineiq-network

  redis-yjs:
    image: redis:7.4-alpine
    container_name: pipelineiq-redis-yjs
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    sysctls:
      net.core.somaxconn: 511
    command: >
      redis-server
      --port 6382
      --maxmemory 128mb
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --loglevel notice
    ports:
      - "127.0.0.1:6382:6382"
    volumes:
      - redis_yjs_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 6382 -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - pipelineiq-network

  minio:
    image: minio/minio:${MINIO_IMAGE_TAG:-latest}
    container_name: pipelineiq-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pipelineiq-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "/api/v1"
        NEXT_PUBLIC_APP_VERSION: "${APP_VERSION:-12.7.3}"
    container_name: pipelineiq-frontend
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_APP_VERSION=${APP_VERSION:-12.7.3}
      - AUTH_JWT_SECRET=${SECRET_KEY}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - pipelineiq-network

  flower:
    build: ./backend
    container_name: pipelineiq-flower
    command: >
      sh -c "sleep 5 &&
      celery --broker=redis://:${REDIS_PASSWORD}@redis-broker:6379/0
      -A backend.celery_app:celery_app flower
      --port=5555
      --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
      --inspect_timeout=10000"
    ports:
      - "127.0.0.1:5555:5555"
    environment:
      - REDIS_BROKER_URL=redis://:${REDIS_PASSWORD}@redis-broker:6379/0
      - REDIS_PUBSUB_URL=redis://:${REDIS_PASSWORD}@redis-pubsub:6380/0
      - REDIS_CACHE_URL=redis://:${REDIS_PASSWORD}@redis-cache:6381/0
      - REDIS_YJS_URL=redis://:${REDIS_PASSWORD}@redis-yjs:6382/0
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_WRITE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - DATABASE_READ_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/pipelineiq
      - FLOWER_USER=${FLOWER_USER}
      - FLOWER_PASSWORD=${FLOWER_PASSWORD}
    depends_on:
      pgbouncer:
        condition: service_healthy
      pgbouncer-replica:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-yjs:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pipelineiq-network

  nginx:
    build: ./nginx
    container_name: pipelineiq-nginx
    environment:
      - API_HOST=api
      - API_PORT=8000
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
      sse-service:
        condition: service_healthy
      frontend:
        condition: service_healthy
      flower:
        condition: service_started
      grafana:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - pipelineiq-network

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: pipelineiq-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - pipelineiq-network

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: pipelineiq-jaeger
    mem_limit: 200m
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=100000
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - pipelineiq-network

  grafana:
    image: grafana/grafana:10.2.0
    container_name: pipelineiq-grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_DATABASE_WAL=true
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - pipelineiq-network

  redpanda-init:
    image: alpine:3.19
    container_name: pipelineiq-redpanda-init
    command:
      - sh
      - -c
      - |
        DATA="/var/lib/redpanda/data"
        VERSION_FILE="$${DATA}/.redpanda_version"
        EXPECTED="v24.2.1"
        if [ -f "$$VERSION_FILE" ]; then
          PREV=$(cat "$$VERSION_FILE")
          if [ "$$PREV" != "$$EXPECTED" ]; then
            echo "Redpanda version mismatch: previous=$$PREV, expected=$$EXPECTED. Clearing stale data..."
            rm -rf "$${DATA:?}/"*
          fi
        fi
        mkdir -p "$$DATA"
        echo "$$EXPECTED" > "$$VERSION_FILE"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    restart: "no"
    networks:
      - pipelineiq-network

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.1
    container_name: pipelineiq-redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 2G
      - --reserve-memory
      - 256M
      - --overprovisioned
      - --default-log-level=warn
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:9093
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092,INTERNAL://redpanda:9093
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --schema-registry-addr
      - 0.0.0.0:8081
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --set
      - log_retention_ms=3600000
      - --set
      - retention_local_target_bytes=5368709120
    ports:
      - "127.0.0.1:9092:9092"
      - "127.0.0.1:8082:8082"
      - "127.0.0.1:8081:8081"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    mem_limit: 3g
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    networks:
      - pipelineiq-network

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.8.10
    container_name: pipelineiq-redpanda-console
    restart: unless-stopped
    entrypoint: /bin/sh
    command: -c "printf 'kafka:\\n  brokers:\\n    - redpanda:9093\\n' > /tmp/config.yml && /app/console --config.filepath=/tmp/config.yml"
    ports:
      - "127.0.0.1:8090:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    mem_limit: 100m
    networks:
      - pipelineiq-network

  worker-streaming:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipelineiq-worker-streaming
    command: >
      celery -A backend.celery_app:celery_app worker -E
      --queues=streaming
      --concurrency=8
      --prefetch-multiplier=1
      --hostname=streaming@%%h
      --loglevel=info
    env_file:
      - .env
    environment:
      - REDIS_BROKER_URL=redis://:${REDIS_PASSWORD}@redis-broker:6379/0
      - REDPANDA_BROKERS=redpanda:9093
      - CELERY_CONCURRENCY=8
      - OTEL_SERVICE_NAME=pipelineiq-worker
      - OTEL_SAMPLE_RATE=1.0
    depends_on:
      redis-broker:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: unless-stopped
    shm_size: '2gb'
    volumes:
      - uploads:/app/uploads
      - ./backend:/app/backend
    networks:
      - pipelineiq-network


volumes:
  uploads:
  db_data:
  postgres_replica_data_v2:
  redis_broker_data:
  redis_cache_data:
  redis_yjs_data:
  minio_data:
  prometheus_data:
  grafana_data:
  redpanda_data: {}

networks:
  pipelineiq-network:
    driver: bridge
