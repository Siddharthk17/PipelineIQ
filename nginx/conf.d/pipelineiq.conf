resolver 127.0.0.11 ipv6=off valid=10s;

log_format pipelineiq escape=json '$remote_addr - $remote_user [$time_local] '
    '"$request_method $uri $server_protocol" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    '$request_time "$host" $upstream_addr';

access_log /dev/stdout pipelineiq if=$loggable;
error_log /dev/stderr;

server {
    listen 80;
    server_name _;
    client_max_body_size 500M;

    # Gzip compression for large API responses (e.g., 9.7MB lineage payloads)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types application/json application/javascript text/plain text/css application/xml;

    set $backend http://api:8000;
    set $sse_backend http://sse-service:8001;
    set $frontend http://frontend:3000;
    set $flower http://flower:5555;
    set $grafana_backend http://grafana:3000;

    # Correlation ID: Nginx $request_id is built-in (since 1.11.0).
    # Passed as X-Request-ID header to all proxied backends for end-to-end tracing.

    # Security headers — for most responses
    include /etc/nginx/conf.d/security-headers.inc;
    # NO global CSP - add it only to specific locations that need it

    # Catalog impact/lineage queries - long-running graph traversals
    location ~ ^/api/catalog/assets/[^/]+/(impact|lineage) {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Request-ID $request_id;
        client_max_body_size 1M;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    # Backend API
    location /api/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Request-ID $request_id;
        client_max_body_size 500M;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # SSE streaming — CRITICAL: buffering must be OFF
    location /api/v1/pipelines/stream {
        access_log off;
        proxy_pass $sse_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
        include /etc/nginx/conf.d/security-headers.inc;
        add_header X-Accel-Buffering no;
    }

    # Also handle the run-specific SSE endpoint pattern
    location ~ ^/api/v1/pipelines/[^/]+/stream$ {
        access_log off;
        proxy_pass $sse_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
        include /etc/nginx/conf.d/security-headers.inc;
        add_header X-Accel-Buffering no;
    }

    location ~ ^/api/v1/runs/[^/]+/stream$ {
        access_log off;
        proxy_pass $sse_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
        include /etc/nginx/conf.d/security-headers.inc;
        add_header X-Accel-Buffering no;
    }

    location ~ ^/api/runs/[^/]+/stream$ {
        access_log off;
        proxy_pass $sse_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
        include /etc/nginx/conf.d/security-headers.inc;
        add_header X-Accel-Buffering no;
    }

    # Auth endpoints
    location /auth/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # Webhook endpoints
    location /webhooks/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # Audit log endpoints
    location /audit/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # Prometheus metrics — restrict to internal/docker network only
    # NO CSP headers for Prometheus - it makes internal fetch requests
    location /metrics {
        include /etc/nginx/conf.d/security-headers.inc;
        
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check endpoint
    location /health {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    location /livez {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    location /readyz {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # FastAPI docs are not exposed through the public reverse proxy.
    location /docs {
        return 404;
    }

    location /redoc {
        return 404;
    }

    location /openapi.json {
        return 404;
    }

    # Flower task monitor is localhost-only in docker-compose.
    location /flower/ {
        return 404;
    }

    # Grafana dashboard — NO CSP headers, Grafana makes internal API calls
    # Login through nginx proxy - pass auth headers properly
    location /grafana/ {
        include /etc/nginx/conf.d/security-headers.inc;
        
        # Use variable-based upstream so Docker DNS is re-resolved after Grafana container IP changes.
        proxy_pass $grafana_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Uri $request_uri;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
        
        # Important: pass Authorization header for Grafana API auth
        proxy_pass_header Set-Cookie;
        proxy_pass_header Cookie;
    }

    # Frontend — everything else - CSP for Next.js
    location / {
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'unsafe-hashes'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http://localhost:3002 ws://localhost:* http://api:8000 http://localhost:8000; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
        
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
