---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-broker
  namespace: pipelineiq
  labels:
    app: redis-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-broker
  template:
    metadata:
      labels:
        app: redis-broker
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pipelineiq-secrets
                  key: REDIS_PASSWORD
          command:
            - redis-server
            - --port
            - "6379"
            - --save
            - "60"
            - "1"
            - --requirepass
            - "$(REDIS_PASSWORD)"
            - --loglevel
            - warning
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -p 6379 -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis-broker
  namespace: pipelineiq
spec:
  selector:
    app: redis-broker
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
